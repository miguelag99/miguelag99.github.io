services:
  web:
    image: node:20
    working_dir: /app
    user: "0:0"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    command:
      - sh
      - -c
      - |
        set -e
        export COREPACK_ENABLE_DOWNLOAD_PROMPT=0
        corepack enable
        corepack prepare pnpm@10.33.0 --activate
        pnpm config set store-dir /pnpm/store
        pnpm install --frozen-lockfile
        pnpm dev
    network_mode: host
    stdin_open: true
    tty: true

volumes:
  node_modules:
  pnpm_store:
